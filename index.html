<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f7c26a;
    --accent3: #6af7c2;
    --red: #f76a6a;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --diners: #f7c26a;
    --inter: #6af7c2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header-title span { color: var(--accent); }
  .last-update {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }
  .dot-live {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(1.4); }
  }

  /* MAIN */
  .main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  /* PAGO CARD */
  .pay-card {
    background: linear-gradient(135deg, #1a1530 0%, #0f1a2e 100%);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .pay-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(124,106,247,0.3) 0%, transparent 70%);
    pointer-events: none;
  }
  .pay-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .pay-amount {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .pay-amount span { color: var(--accent); font-size: 24px; }
  .pay-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pay-date-badge {
    background: rgba(124,106,247,0.2);
    border: 1px solid rgba(124,106,247,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }
  .pay-progress {
    margin-top: 16px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .pay-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 4px;
    transition: width 1s ease;
  }
  .pay-progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .pay-progress-labels span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-icon {
    font-size: 18px;
    margin-bottom: 8px;
    display: block;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .stat-value.diners { color: var(--diners); }
  .stat-value.inter { color: var(--inter); }
  .stat-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CHART CARD */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
  }
  .chart-container { position: relative; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* TRANSACTIONS */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .tx-item:hover { border-color: var(--accent); }
  .tx-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tx-dot.diners { background: var(--diners); }
  .tx-dot.inter { background: var(--inter); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-comercio {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tx-amount {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tx-amount.soles { color: var(--text); }
  .tx-amount.usd { color: var(--accent2); }

  /* TOP COMERCIOS */
  .comercio-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .comercio-item:last-child { border-bottom: none; }
  .comercio-rank {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
  }
  .comercio-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .comercio-bar-wrap {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .comercio-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
  }
  .comercio-amount {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    width: 60px;
    text-align: right;
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-box {
    background: rgba(247,106,106,0.1);
    border: 1px solid var(--red);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
  }

  /* CONFIG */
  .config-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px; height: 48px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,106,247,0.4);
    z-index: 200;
    transition: transform 0.2s;
  }
  .config-btn:hover { transform: scale(1.1) rotate(30deg); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .input-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .input-group input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  /* MES selector */
  .mes-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .mes-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .mes-nav button:hover { border-color: var(--accent); }
  .mes-label {
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">mis<span>gastos</span></div>
  <div class="last-update">
    <div><span class="dot-live"></span>en vivo</div>
    <div id="last-update-time">—</div>
  </div>
</div>

<div class="main" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Cargando datos...</span>
  </div>
</div>

<button class="config-btn" onclick="openModal()">⚙</button>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>⚙ Configuración</h3>
    <div class="input-group">
      <label>Airtable API Token</label>
      <input type="password" id="cfg-token" placeholder="patXXXXXXXXXXXXXX">
    </div>
    <div class="input-group">
      <label>Base ID (Consumos)</label>
      <input type="text" id="cfg-base" placeholder="appaRF3MY4N7SK354">
    </div>
    <div class="input-group">
      <label>Table ID — Consumo Diners</label>
      <input type="text" id="cfg-diners" placeholder="tblEogYL9lcKlXLMB">
    </div>
    <div class="input-group">
      <label>Table ID — Consumo Interbank</label>
      <input type="text" id="cfg-inter" placeholder="tblKsxt1lVKlSCd4K">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveConfig()">Guardar y cargar</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const STORAGE_KEY = 'gastos_cfg';
let CFG = {
  token: '',
  base: 'appaRF3MY4N7SK354',
  diners: 'tblEogYL9lcKlXLMB',
  inter: 'tblKsxt1lVKlSCd4K'
};

function loadCfg() {
  try {
    const s = sessionStorage.getItem(STORAGE_KEY);
    if (s) CFG = { ...CFG, ...JSON.parse(s) };
  } catch(e) {}
}
function saveCfg() {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(CFG));
}
function openModal() {
  document.getElementById('cfg-token').value = CFG.token;
  document.getElementById('cfg-base').value = CFG.base;
  document.getElementById('cfg-diners').value = CFG.diners;
  document.getElementById('cfg-inter').value = CFG.inter;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function saveConfig() {
  CFG.token = document.getElementById('cfg-token').value.trim();
  CFG.base = document.getElementById('cfg-base').value.trim();
  CFG.diners = document.getElementById('cfg-diners').value.trim();
  CFG.inter = document.getElementById('cfg-inter').value.trim();
  saveCfg();
  closeModal();
  init();
}

// ─── FECHA DE PAGO ────────────────────────────────────────
function getPayDate(year, month) {
  // Pago el 25, si domingo → sábado 24
  const d = new Date(year, month - 1, 25);
  if (d.getDay() === 0) d.setDate(24); // domingo → sábado
  return d;
}

function getCiclo(ref = new Date()) {
  // Ciclo: del 26 del mes anterior al 25 del mes actual
  let y = ref.getFullYear(), m = ref.getMonth() + 1;
  const payThisMonth = getPayDate(y, m);
  let start, end, label;
  if (ref <= payThisMonth) {
    // Aún no pagamos este mes → ciclo: 26 mes anterior → 25 este mes
    const prevM = m === 1 ? 12 : m - 1;
    const prevY = m === 1 ? y - 1 : y;
    start = new Date(prevY, prevM - 1, 26);
    end = payThisMonth;
    label = `26 ${monthName(prevM)} – 25 ${monthName(m)}`;
  } else {
    // Ya pasó el pago → ciclo: 26 este mes → 25 próximo mes
    const nextM = m === 12 ? 1 : m + 1;
    const nextY = m === 12 ? y + 1 : y;
    start = new Date(y, m - 1, 26);
    end = getPayDate(nextY, nextM);
    label = `26 ${monthName(m)} – 25 ${monthName(nextM)}`;
  }
  return { start, end, label };
}

const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function monthName(m) { return MONTHS[m-1]; }

// ─── AIRTABLE FETCH ───────────────────────────────────────
async function fetchTable(tableId) {
  if (!CFG.token) throw new Error('Configura tu API Token de Airtable');
  const url = `https://api.airtable.com/v0/${CFG.base}/${tableId}?pageSize=100`;
  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${CFG.token}` }
  });
  if (!res.ok) throw new Error(`Error Airtable: ${res.status}`);
  const data = await res.json();
  let records = data.records || [];
  // Paginar si hay más
  let offset = data.offset;
  while (offset) {
    const r2 = await fetch(`${url}&offset=${offset}`, {
      headers: { Authorization: `Bearer ${CFG.token}` }
    });
    const d2 = await r2.json();
    records = records.concat(d2.records || []);
    offset = d2.offset;
  }
  return records.map(r => ({ id: r.id, ...r.fields }));
}

// ─── STATE ────────────────────────────────────────────────
let currentMesOffset = 0; // 0 = mes actual, -1 = anterior, etc.
let allDiners = [], allInter = [];
let charts = {};

// ─── HELPERS ─────────────────────────────────────────────
function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function getMonthBounds(offset = 0) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1 + offset;
  const date = new Date(y, m - 1, 1);
  const start = new Date(date.getFullYear(), date.getMonth(), 1);
  const end = new Date(date.getFullYear(), date.getMonth() + 1, 0);
  return { start, end, label: `${monthName(date.getMonth()+1)} ${date.getFullYear()}` };
}

function filterByMonth(records, offset, dateField) {
  const { start, end } = getMonthBounds(offset);
  return records.filter(r => {
    const d = parseDate(r[dateField]);
    if (!d) return false;
    return d >= start && d <= end;
  });
}

function sumMonto(records) {
  return records.reduce((acc, r) => {
    const v = parseFloat(r['Monto'] ?? r['monto'] ?? 0);
    return acc + (isNaN(v) ? 0 : v);
  }, 0);
}

function fmt(n) {
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  // Ciclo de pago
  const ciclo = getCiclo();
  const now = new Date();
  const totalCicloDays = (ciclo.end - ciclo.start) / 86400000;
  const daysIn = Math.max(0, (now - ciclo.start) / 86400000);
  const progPct = Math.min(100, (daysIn / totalCicloDays) * 100);
  const daysLeft = Math.max(0, Math.ceil((ciclo.end - now) / 86400000));

  // Mes seleccionado
  const { label: mesLabel } = getMonthBounds(currentMesOffset);
  const dinersMonth = filterByMonth(allDiners, currentMesOffset, 'Fecha Texto');
  const interMonth = filterByMonth(allInter, currentMesOffset, 'Fecha de Transacción');

  const totalDiners = sumMonto(dinersMonth);
  const totalInter = interMonth.reduce((acc, r) => {
    const raw = String(r['monto texto'] ?? r['monto'] ?? '0');
    const n = parseFloat(raw.replace(/[^0-9.]/g, ''));
    return acc + (isNaN(n) ? 0 : n);
  }, 0);
  const totalMes = totalDiners + totalInter;

  // Ciclo gastos (Diners campo Fecha Texto, Inter Fecha de Transacción)
  const dinersCiclo = allDiners.filter(r => {
    const d = parseDate(r['Fecha Texto']);
    return d && d >= ciclo.start && d <= ciclo.end;
  });
  const interCiclo = allInter.filter(r => {
    const d = parseDate(r['Fecha de Transacción']);
    return d && d >= ciclo.start && d <= ciclo.end;
  });
  const totalCiclo = sumMonto(dinersCiclo) + interCiclo.reduce((acc,r) => {
    const n = parseFloat(String(r['monto texto']??r['monto']??'0').replace(/[^0-9.]/g,''));
    return acc + (isNaN(n)?0:n);
  }, 0);

  // Últimas transacciones del mes
  const allMonth = [
    ...dinersMonth.map(r => ({
      comercio: r['Comercio'] || r['Subject'] || '—',
      fecha: r['Fecha Texto'],
      monto: r['Monto'] ?? 0,
      moneda: 'S/',
      tipo: 'diners'
    })),
    ...interMonth.map(r => ({
      comercio: r['Destinatario'] || '—',
      fecha: r['Fecha de Transacción']?.slice(0,10),
      monto: parseFloat(String(r['monto texto']??r['monto']??'0').replace(/[^0-9.]/g,'')),
      moneda: r['Moneda'] || 'S/',
      tipo: 'inter'
    }))
  ].sort((a,b) => (b.fecha||'') > (a.fecha||'') ? 1 : -1).slice(0, 20);

  // Top comercios
  const comercioMap = {};
  allMonth.forEach(t => {
    const k = t.comercio.toUpperCase().trim().slice(0,30);
    comercioMap[k] = (comercioMap[k] || 0) + t.monto;
  });
  const topComercios = Object.entries(comercioMap)
    .sort((a,b) => b[1]-a[1]).slice(0,5);
  const maxComercio = topComercios[0]?.[1] || 1;

  // Gastos por mes (últimos 6 meses)
  const monthlyData = [];
  for (let i = -5; i <= 0; i++) {
    const { label } = getMonthBounds(i);
    const d = filterByMonth(allDiners, i, 'Fecha Texto');
    const it = filterByMonth(allInter, i, 'Fecha de Transacción');
    const sd = sumMonto(d);
    const si = it.reduce((acc,r) => {
      const n = parseFloat(String(r['monto texto']??r['monto']??'0').replace(/[^0-9.]/g,''));
      return acc + (isNaN(n)?0:n);
    }, 0);
    monthlyData.push({ label: label.split(' ')[0], diners: sd, inter: si });
  }

  app.innerHTML = `
    <!-- PAGO CARD -->
    <div class="pay-card">
      <div class="pay-label">A PAGAR ESTE CICLO</div>
      <div class="pay-amount"><span>S/</span> ${fmt(totalCiclo)}</div>
      <div class="pay-sub">
        <span>${ciclo.label}</span>
        <div class="pay-date-badge">faltan ${daysLeft}d</div>
      </div>
      <div class="pay-progress">
        <div class="pay-progress-bar" style="width:${progPct}%"></div>
      </div>
      <div class="pay-progress-labels">
        <span>inicio ciclo</span>
        <span>pago el ${ciclo.end.getDate()}</span>
      </div>
    </div>

    <!-- MES NAV -->
    <div class="mes-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="mes-label">${mesLabel}</div>
      <button onclick="changeMonth(1)" ${currentMesOffset >= 0 ? 'disabled style="opacity:0.3"' : ''}>›</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">💳</span>
        <div class="stat-label">Diners</div>
        <div class="stat-value diners">S/ ${fmt(totalDiners)}</div>
        <div class="stat-sub">${dinersMonth.length} consumos</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🏦</span>
        <div class="stat-label">Interbank</div>
        <div class="stat-value inter">S/ ${fmt(totalInter)}</div>
        <div class="stat-sub">${interMonth.length} consumos</div>
      </div>
      <div class="stat-card full">
        <span class="stat-icon">📊</span>
        <div class="stat-label">Total del mes</div>
        <div class="stat-value" style="font-size:28px">S/ ${fmt(totalMes)}</div>
        <div class="stat-sub">${dinersMonth.length + interMonth.length} transacciones en total</div>
      </div>
    </div>

    <!-- CHART MENSUAL -->
    <div class="section-title">Evolución mensual</div>
    <div class="chart-card">
      <div class="chart-title">Últimos 6 meses</div>
      <div class="chart-container" style="height:180px">
        <canvas id="chart-monthly"></canvas>
      </div>
    </div>

    <!-- CHART TORTA -->
    <div class="chart-card">
      <div class="chart-title">Distribución Diners vs Interbank</div>
      <div style="display:flex;gap:16px;align-items:center">
        <div class="chart-container" style="width:140px;height:140px;flex-shrink:0">
          <canvas id="chart-pie"></canvas>
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:var(--diners);flex-shrink:0"></div>
            <div>
              <div style="font-size:12px;color:var(--muted)">Diners</div>
              <div style="font-size:15px;font-weight:700;color:var(--diners)">S/ ${fmt(totalDiners)}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:10px;height:10px;border-radius:50%;background:var(--inter);flex-shrink:0"></div>
            <div>
              <div style="font-size:12px;color:var(--muted)">Interbank</div>
              <div style="font-size:15px;font-weight:700;color:var(--inter)">S/ ${fmt(totalInter)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOP COMERCIOS -->
    <div class="section-title">Top comercios</div>
    <div class="chart-card">
      ${topComercios.length === 0
        ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">Sin datos este mes</div>'
        : topComercios.map(([name, amt], i) => `
        <div class="comercio-item">
          <div class="comercio-rank">#${i+1}</div>
          <div class="comercio-name">${name}</div>
          <div class="comercio-bar-wrap">
            <div class="comercio-bar" style="width:${(amt/maxComercio*100).toFixed(0)}%"></div>
          </div>
          <div class="comercio-amount">S/${fmt(amt)}</div>
        </div>`).join('')}
    </div>

    <!-- ÚLTIMAS TX -->
    <div class="section-title">Últimas transacciones</div>
    <div class="tx-list">
      ${allMonth.length === 0
        ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">Sin datos este mes</div>'
        : allMonth.map(t => `
        <div class="tx-item">
          <div class="tx-dot ${t.tipo}"></div>
          <div class="tx-info">
            <div class="tx-comercio">${t.comercio}</div>
            <div class="tx-meta">${t.tipo === 'diners' ? 'Diners' : 'Interbank'} · ${t.fecha || '—'}</div>
          </div>
          <div class="tx-amount ${t.moneda === 'USD' ? 'usd' : 'soles'}">${t.moneda} ${fmt(t.monto)}</div>
        </div>`).join('')}
    </div>
  `;

  // Charts
  destroyCharts();

  // Mensual bar chart
  const ctxM = document.getElementById('chart-monthly');
  if (ctxM) {
    charts.monthly = new Chart(ctxM, {
      type: 'bar',
      data: {
        labels: monthlyData.map(d => d.label),
        datasets: [
          { label: 'Diners', data: monthlyData.map(d => d.diners), backgroundColor: '#f7c26a88', borderColor: '#f7c26a', borderWidth: 2, borderRadius: 6 },
          { label: 'Interbank', data: monthlyData.map(d => d.inter), backgroundColor: '#6af7c288', borderColor: '#6af7c2', borderWidth: 2, borderRadius: 6 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { stacked: false, grid: { color: '#2a2a3a' }, ticks: { color: '#6b6b85', font: { size: 10 } } },
          y: { grid: { color: '#2a2a3a' }, ticks: { color: '#6b6b85', font: { size: 10 }, callback: v => 'S/'+v } }
        }
      }
    });
  }

  // Torta
  const ctxP = document.getElementById('chart-pie');
  if (ctxP && (totalDiners + totalInter) > 0) {
    charts.pie = new Chart(ctxP, {
      type: 'doughnut',
      data: {
        labels: ['Diners', 'Interbank'],
        datasets: [{
          data: [totalDiners, totalInter],
          backgroundColor: ['#f7c26a', '#6af7c2'],
          borderColor: '#13131a',
          borderWidth: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '70%',
        plugins: { legend: { display: false } }
      }
    });
  }

  document.getElementById('last-update-time').textContent = new Date().toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'});
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

function changeMonth(dir) {
  if (currentMesOffset + dir > 0) return;
  currentMesOffset += dir;
  render();
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div><span>Conectando con Airtable...</span></div>`;

  if (!CFG.token) {
    app.innerHTML = `
      <div class="error-box">⚠ Sin configurar — pulsa ⚙ abajo para ingresar tu API Token de Airtable.</div>
      <div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;line-height:1.6">
        Necesitas tu <strong style="color:var(--text)">Personal Access Token</strong> de Airtable.<br><br>
        Ve a <strong style="color:var(--accent)">airtable.com/create/tokens</strong> y crea uno con permisos <em>data.records:read</em> en tu base <em>Consumos</em>.
      </div>`;
    return;
  }

  try {
    [allDiners, allInter] = await Promise.all([
      fetchTable(CFG.diners),
      fetchTable(CFG.inter)
    ]);
    render();

    // Auto-refresh cada 5 minutos
    setTimeout(init, 5 * 60 * 1000);
  } catch(err) {
    app.innerHTML = `<div class="error-box">❌ ${err.message}</div>
      <div style="color:var(--muted);font-size:13px;padding:10px;text-align:center">
        Verifica tu API Token y los IDs de tabla en ⚙
      </div>`;
  }
}

// ─── BOOT ─────────────────────────────────────────────────
loadCfg();
init();
</script>
</body>
</html>
